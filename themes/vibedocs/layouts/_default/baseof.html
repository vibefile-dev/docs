<!DOCTYPE html>
<html lang="en">
<head>
    {{- partial "head.html" . -}}
</head>
<body>
    <div class="glow"></div>
    {{- partial "header.html" . -}}
    <div class="docs-layout">
        {{- partial "sidebar.html" . -}}
        <main class="docs-main">
            <article class="docs-content">
                {{- block "main" . }}{{ end -}}
            </article>
            {{- partial "toc.html" . -}}
        </main>
    </div>
    <script>
    (function() {
        document.querySelectorAll('.docs-content .highlight, .docs-content pre').forEach(function(block) {
            if (block.tagName === 'PRE' && block.closest('.highlight')) return;
            var code = block.querySelector('code');
            if (!code) return;
            var btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = 'Copy';
            btn.setAttribute('aria-label', 'Copy code to clipboard');
            btn.addEventListener('click', function() {
                navigator.clipboard.writeText(code.textContent).then(function() {
                    btn.textContent = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(function() {
                        btn.textContent = 'Copy';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            });
            block.style.position = 'relative';
            block.appendChild(btn);
        });
    })();
    </script>
    <script>
    (function() {
        var toggle = document.querySelector('.mobile-menu-toggle');
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebar-overlay');
        if (!toggle || !sidebar) return;
        function open()  { sidebar.classList.add('open'); overlay.classList.add('open'); }
        function close() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
        toggle.addEventListener('click', function() {
            sidebar.classList.contains('open') ? close() : open();
        });
        overlay.addEventListener('click', close);
        sidebar.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', close); });
    })();
    </script>
</body>
</html>
