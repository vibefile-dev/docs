baseURL = 'https://docs.vibefile.dev/'
languageCode = 'en-us'
title = 'Vibefile Docs'
theme = 'vibedocs'

[markup]
  [markup.highlight]
    style = 'dracula'
    noClasses = false
    lineNos = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "Documentation for Vibefile — the task runner for the AI era"
  githubRepo = "https://github.com/vibefile-dev"
  discordURL = "https://discord.gg/3TsMMvK8tV"
  siteURL = "https://vibefile.dev"

